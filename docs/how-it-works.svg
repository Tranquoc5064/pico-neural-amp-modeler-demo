<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="860" height="230" fill="#ffffff"/>

  <!-- Host PC -->
  <rect x="36" y="62" width="182" height="120" rx="12" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="127" y="116" text-anchor="middle" font-size="17" font-weight="600" fill="#1f2937">Host PC</text>
  <text x="127" y="140" text-anchor="middle" font-size="12.5" fill="#6b7280">DAW / system audio</text>

  <!-- Pico NAM device -->
  <rect x="424" y="48" width="400" height="148" rx="14" fill="#f6f7fb" stroke="#c7cdd9" stroke-width="1.5"/>
  <text x="446" y="76" font-size="13.5" font-weight="700" fill="#374151">Pico NAM &#183; Raspberry Pi Pico 2 (RP2350)</text>
  <rect x="448" y="90" width="352" height="90" rx="11" fill="#eef2ff" stroke="#6366f1" stroke-width="1.6"/>
  <text x="624" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="#3730a3">Neural Amp Modeler</text>
  <text x="624" y="152" text-anchor="middle" font-size="13" fill="#4b5563">A2-Lite &#183; real-time inference</text>

  <!-- top arrow: host audio output -> device (dry) -->
  <line x1="218" y1="104" x2="414" y2="104" stroke="#374151" stroke-width="2.2"/>
  <polygon points="414,98 426,104 414,110" fill="#374151"/>
  <text x="322" y="94" text-anchor="middle" font-size="12.5" fill="#4b5563">audio output (dry)</text>

  <!-- bottom arrow: device -> host audio input (processed) -->
  <line x1="424" y1="140" x2="228" y2="140" stroke="#374151" stroke-width="2.2"/>
  <polygon points="228,134 216,140 228,146" fill="#374151"/>
  <text x="322" y="160" text-anchor="middle" font-size="12.5" fill="#4b5563">audio input (processed)</text>

  <!-- USB Audio link badge (sits between the two arrows) -->
  <rect x="274" y="111" width="96" height="22" rx="11" fill="#ffffff" stroke="#9ca3af" stroke-width="1"/>
  <text x="322" y="126" text-anchor="middle" font-size="11.5" font-weight="700" fill="#6b7280">USB Audio</text>
</svg>
