  <!-- caption -->
  <text x="24" y="364" font-size="12" fill="#92400e">&#9645; Audio ADC / DAC = a planned <tspan font-weight="700">Audio In/Out codec kit</tspan> &#8212; a separate hardware project. The Pico NAM core stays the same.</text>
