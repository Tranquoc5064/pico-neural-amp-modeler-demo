name: Release firmware

# Tag push (v*) builds the firmware and publishes a GitHub Release with the
# .uf2 attached. Manual runs (workflow_dispatch) build and upload the artifact
# only, so the build can be verified before cutting a tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libusb-1.0-0-dev pkg-config python3

      - name: Install Arm GNU Toolchain (14.3.Rel1)
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '14.3.Rel1'

      - name: Checkout Pico SDK (2.2.0)
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/pico-sdk
          ref: '2.2.0'
          path: pico-sdk
          submodules: recursive

      - name: Build firmware
        env:
          PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target pico_nam_loopback
          cp build/pico_nam_loopback.uf2 "pico-nam-${{ github.ref_name }}.uf2"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: pico-nam-${{ github.ref_name }}.uf2

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: pico-nam-${{ github.ref_name }}.uf2
          generate_release_notes: true
